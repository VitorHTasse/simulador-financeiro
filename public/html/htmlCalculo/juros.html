<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Juros Simples</title>
    <script src="../../js/funcoesCalculo/juros.js" defer></script>
    <script src="../../js/animacao.js" defer></script>
    <link rel="stylesheet" href="../../css/index.css">
</head>
<body>
    <header class="header">
        <div class="left">
            <img src="../../imagens/logo.png" alt="Logo">
        </div>
        <div class="right">
            <ul class="navbar">
                <li class="items">
                    <a href="../../../index.html">
                        <i class="fas fa-home"></i> Home
                        <img src="../../imagens/icon_home.png" alt="home_icon" class="nav-icon">
                    </a>
                </li>
                <li class="items">
                    <a href="../../html/sobre.html">
                        <i class="fas fa-info-circle"></i> Sobre
                        <img src="../../imagens/icon_sobre.png" alt="sobre_icon" class="nav-icon">
                    </a>
                </li>
                <li class="items">
                    <a href="../../html/duvidas.html">
                        <i class="fas fa-question-circle"></i> Dúvidas Frequentes
                        <img src="../../imagens/icon_duvida.png" alt="duvida_icon" class="nav-icon">
                    </a>
                </li>
            </ul>
        </div>
        <div class="mid">
            <div id="titulo">
                <h1 id="title">Calculadora de Juros Simples</h1>
            </div>
        </div>
    </header>

    <div id="centro">
        <div class="sobre-conteudo">
        <form>
            <label for="valor">Valor Inicial (em R$)</label>
            <input type="number" placeholder="Valor" id="valor" required>

            <label for="juros">% De Juros (ao mês)</label>
            <input type="number" placeholder="Percentual de Juros" id="juros" required>

            <label for="tempo">Tempo (em meses)</label>
            <input type="number" placeholder="Tempo" id="tempo" required>
        </form>
        </div>
        <div class="dive">
            <button id="calcular" class="btn">Calcular</button>
    </div>
    <h2>Resultado:</h2>
    <div id="resultado"></div>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2025 golden penguin - Sistema de Organização e Planejamento Financeiro. Todos os direitos reservados.</p>
            <p><a href="../contato.html" style="color: white;">Contato</a> | <a href="../politicas.html" style="color: white;">Política de Uso e Privacidade</a></p>
        </div>
    </footer>
</body>
</html>
